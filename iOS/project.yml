name: Skein
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Skein:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Skein
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.yarnstash
        INFOPLIST_FILE: Skein/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Skein - Yarn Stash"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    info:
      path: Skein/Info.plist
      properties:
        CFBundleDisplayName: "Skein - Yarn Stash"
        ITSAppUsesNonExemptEncryption: false
  SkeinTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SkeinTests
    dependencies:
      - target: Skein
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.yarnstash.tests
  SkeinUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SkeinUITests
    dependencies:
      - target: Skein
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.yarnstash.uitests
schemes:
  Skein:
    build:
      targets:
        Skein: all
    test:
      targets:
        - SkeinTests
        - SkeinUITests
    run:
      config: Debug
